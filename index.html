<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abraxas Schnuppertag Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root {
    --bg:#0a1a1a; --surface:#0f2020; --surface2:#163030;
    --border:#1e4040; --accent:#00b4b4; --accent-light:#00d4d4;
    --text:#e8f4f4; --muted:#5a9090; --radius:10px;
    --mine-bg:#0f3535; --mine-border:#1a5050;
    --theirs-bg:#163030; --theirs-border:#1e4040;
    --red:#ff5555; --red-dark:#cc3333; --purple:#7b5ea7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }

  /* LOGIN */
  #login-screen { display:flex; align-items:center; justify-content:center; height:100vh; background:linear-gradient(135deg,#0a1a1a 0%,#0f2a2a 100%); }
  .login-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:48px 40px; width:380px; box-shadow:0 20px 60px rgba(0,180,180,0.1); }
  .login-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; padding-bottom:24px; border-bottom:1px solid var(--border); }
  .login-logo svg { width:120px; }
  .login-box h1 { font-size:20px; font-weight:600; margin-bottom:6px; }
  .login-box p { font-size:13px; color:var(--muted); margin-bottom:24px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:11px; font-family:'IBM Plex Mono',monospace; letter-spacing:1px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; }
  .field input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:11px 14px; color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:13px; outline:none; transition:border-color .2s; }
  .field input:focus { border-color:var(--accent); }
  .field input::placeholder { color:var(--muted); }
  .btn-login { width:100%; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); padding:13px; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; letter-spacing:1px; cursor:pointer; margin-top:8px; transition:background .2s; }
  .btn-login:hover { background:var(--accent-light); }
  .error-msg { font-size:12px; color:#ff6b6b; margin-top:10px; display:none; }

  /* APP */
  #chat-screen { display:none; height:100vh; }
  .app { display:flex; height:100vh; }

  /* Sidebar */
  .sidebar { width:280px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .sidebar-top { padding:14px 16px; border-bottom:1px solid var(--border); background:var(--surface2); }
  .sidebar-top svg { width:90px; }
  .me-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .me-avatar { width:34px; height:34px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; font-family:'IBM Plex Mono',monospace; flex-shrink:0; }
  .me-avatar.betreuer { background:var(--purple); }
  .me-info .me-name { font-size:13px; font-weight:600; }
  .me-info .me-user { font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; }
  .section-label { font-size:9px; font-family:'IBM Plex Mono',monospace; letter-spacing:2px; color:var(--muted); text-transform:uppercase; padding:12px 16px 4px; }
  .contacts { overflow-y:auto; }
  .contacts::-webkit-scrollbar { width:3px; }
  .contacts::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .contact { display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer; transition:background .15s; border-left:2px solid transparent; }
  .contact:hover { background:var(--surface2); }
  .contact.active { background:var(--surface2); border-left-color:var(--accent); }
  .contact-avatar { width:34px; height:34px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:var(--accent); font-family:'IBM Plex Mono',monospace; flex-shrink:0; }
  .contact-avatar.betreuer { color:var(--purple); border-color:var(--purple); }
  .contact.active .contact-avatar { background:var(--accent); color:#fff; border-color:var(--accent); }
  .contact-info .contact-name { font-size:13px; font-weight:500; }
  .contact-info .contact-preview { font-size:11px; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px; }
  .sidebar-bottom { padding:8px; border-top:1px solid var(--border); margin-top:auto; display:flex; flex-direction:column; gap:6px; }
  .bot-id-box { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px; }
  .bot-id-label { font-size:9px; font-family:'IBM Plex Mono',monospace; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
  .bot-id-value { font-size:10px; font-family:'IBM Plex Mono',monospace; color:var(--accent); word-break:break-all; line-height:1.4; cursor:pointer; }
  .bot-id-value:hover { color:var(--accent-light); }
  .btn-reset { width:100%; background:transparent; color:var(--red); border:1px solid var(--red); border-radius:var(--radius); padding:9px; font-family:'IBM Plex Mono',monospace; font-size:11px; cursor:pointer; transition:all .2s; }
  .btn-reset:hover { background:var(--red); color:#fff; }

  /* Chat */
  .chat-area { flex:1; display:flex; flex-direction:column; background:var(--bg); }
  .chat-header { padding:14px 20px; border-bottom:1px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:12px; }
  .chat-header-avatar { width:34px; height:34px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; font-family:'IBM Plex Mono',monospace; }
  .chat-header-info .chat-with { font-size:14px; font-weight:600; }
  .chat-header-info .chat-status { font-size:11px; color:var(--accent); font-family:'IBM Plex Mono',monospace; }
  .no-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); gap:12px; }
  .no-chat p { font-size:13px; font-family:'IBM Plex Mono',monospace; }
  .messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:8px; }
  .messages::-webkit-scrollbar { width:4px; }
  .messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .msg { max-width:72%; animation:pop .15s ease; align-self:flex-start; }
  @keyframes pop { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .msg-meta { font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--muted); margin-bottom:3px; display:flex; align-items:center; gap:6px; }
  .msg-name { color:var(--accent); font-weight:500; }
  .msg-name.is-me { color:var(--accent-light); }
  .msg-bubble { padding:10px 14px; border-radius:0 12px 12px 12px; font-size:14px; line-height:1.6; }
  .msg.mine .msg-bubble { background:var(--mine-bg); border:1px solid var(--mine-border); }
  .msg.theirs .msg-bubble { background:var(--theirs-bg); border:1px solid var(--theirs-border); }
  .input-area { padding:14px 20px; border-top:1px solid var(--border); background:var(--surface); display:flex; gap:10px; align-items:flex-end; }
  .msg-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:11px 14px; color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:14px; outline:none; resize:none; transition:border-color .2s; }
  .msg-input:focus { border-color:var(--accent); }
  .msg-input::placeholder { color:var(--muted); }
  .send-btn { width:42px; height:42px; border-radius:var(--radius); background:var(--accent); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s; }
  .send-btn:hover { background:var(--accent-light); }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:100; }
  .modal-overlay.visible { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; width:340px; text-align:center; }
  .modal h3 { font-size:18px; margin-bottom:8px; }
  .modal p { font-size:13px; color:var(--muted); margin-bottom:24px; }
  .modal-btns { display:flex; gap:10px; }
  .modal-cancel { flex:1; background:transparent; border:1px solid var(--border); color:var(--text); border-radius:var(--radius); padding:11px; font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer; }
  .modal-confirm { flex:1; background:var(--red); border:none; color:#fff; border-radius:var(--radius); padding:11px; font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer; }
  .modal-confirm:hover { background:var(--red-dark); }
</style>
</head>
<body>

<!-- RESET MODAL -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal">
    <h3>⚠️ Alles zurücksetzen?</h3>
    <p>Alle Chats und Namen werden gelöscht. Dies kann nicht rückgängig gemacht werden.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeReset()">Abbrechen</button>
      <button class="modal-confirm" onclick="confirmReset()">Ja, zurücksetzen</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="5" width="42" height="42" rx="8" fill="#00b4b4"/>
        <text x="21" y="33" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="white">a</text>
        <text x="58" y="36" font-family="Arial,sans-serif" font-size="24" font-weight="400" fill="#00b4b4" letter-spacing="1">abraxas</text>
      </svg>
    </div>
    <h1>Schnuppertag 2026</h1>
    <p>Melde dich an und gib deinen Namen ein</p>
    <div class="field"><label>Benutzername</label><input type="text" id="u" placeholder="schnuppi1" autocomplete="off"/></div>
    <div class="field"><label>Passwort</label><input type="password" id="p" placeholder="••••••••"/></div>
    <div class="field"><label>Dein Name</label><input type="text" id="n" placeholder="z.B. Luca"/></div>
    <button class="btn-login" onclick="login()">EINLOGGEN →</button>
    <div class="error-msg" id="err">Falscher Benutzername oder Passwort</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-top">
        <svg viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="3" width="36" height="36" rx="7" fill="#00b4b4"/>
          <text x="18" y="27" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="white">a</text>
          <text x="46" y="28" font-family="Arial,sans-serif" font-size="18" font-weight="400" fill="#00b4b4" letter-spacing="1">abraxas</text>
        </svg>
      </div>
      <div class="me-header">
        <div class="me-avatar" id="me-avatar">—</div>
        <div class="me-info">
          <div class="me-name" id="me-name">—</div>
          <div class="me-user" id="me-user">—</div>
        </div>
      </div>
      <div class="section-label">Schnuppis</div>
      <div class="contacts" id="contacts-schnuppi"></div>
      <div class="section-label">Betreuer</div>
      <div class="contacts" id="contacts-betreuer"></div>
      <div class="sidebar-bottom">
        <div class="bot-id-box" id="bot-id-box">
          <div class="bot-id-label">Bot-ID (für später)</div>
          <div class="bot-id-value" id="bot-id">—</div>
        </div>
        <button class="btn-reset" id="reset-btn" style="display:none" onclick="openReset()">⚠️ Schnuppertag zurücksetzen</button>
      </div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="no-chat">
        <p>← Wähle einen Chat</p>
      </div>
    </div>
  </div>
</div>

<script>
const S = window.location.origin;
let me, myName, myBotId, myRole, users = [];
let activeChat = null;
let lastIds = {};
let previews = {};

async function login() {
  const u = document.getElementById("u").value.trim();
  const p = document.getElementById("p").value;
  const n = document.getElementById("n").value.trim();
  const err = document.getElementById("err");
  try {
    const r = await fetch(`${S}/api/login`, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({username:u, password:p, custom_name:n})});
    const d = await r.json();
    if (d.success) {
      me = d.username; myName = d.display_name; myBotId = d.bot_id; myRole = d.role;
      err.style.display = "none";
      startApp();
    } else { err.style.display = "block"; }
  } catch(e) { err.style.display = "block"; err.textContent = "Server nicht erreichbar"; }
}

async function startApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("chat-screen").style.display = "block";
  document.getElementById("me-name").textContent = myName;
  document.getElementById("me-user").textContent = me;
  const av = document.getElementById("me-avatar");
  av.textContent = myName.slice(0,2).toUpperCase();
  if (myRole === "betreuer") {
    av.classList.add("betreuer");
    document.getElementById("bot-id-box").style.display = "none";
    document.getElementById("reset-btn").style.display = "block";
  } else {
    const botEl = document.getElementById("bot-id");
    botEl.textContent = myBotId || "—";
    botEl.onclick = () => { navigator.clipboard.writeText(myBotId); botEl.textContent = "✓ Kopiert!"; setTimeout(()=>botEl.textContent=myBotId,1500); };
  }

  const r = await fetch(`${S}/api/users`);
  users = await r.json();
  renderContacts();
  setInterval(pollAll, 2000);
}

function renderContacts() {
  renderList("contacts-schnuppi", users.filter(u => u.username !== me && u.role === "schnuppi"));
  renderList("contacts-betreuer", users.filter(u => u.username !== me && u.role === "betreuer"));
}

function renderList(id, list) {
  const c = document.getElementById(id);
  c.innerHTML = "";
  list.forEach(u => {
    const el = document.createElement("div");
    el.className = "contact" + (activeChat === u.username ? " active" : "");
    el.id = "contact-" + u.username;
    el.innerHTML = `
      <div class="contact-avatar ${u.role==='betreuer'?'betreuer':''}">${u.display.slice(0,2).toUpperCase()}</div>
      <div class="contact-info">
        <div class="contact-name">${u.display}</div>
        <div class="contact-preview">${esc(previews[u.username]||"")}</div>
      </div>`;
    el.onclick = () => openChat(u);
    c.appendChild(el);
  });
}

function openChat(u) {
  activeChat = u.username;
  lastIds[u.username] = lastIds[u.username] || 0;
  renderContacts();
  const area = document.getElementById("chat-area");
  area.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-avatar" style="${u.role==='betreuer'?'background:var(--purple)':''}">${u.display.slice(0,2).toUpperCase()}</div>
      <div class="chat-header-info">
        <div class="chat-with">${u.display}</div>
        <div class="chat-status">● Online</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea class="msg-input" id="msg-input" rows="1" placeholder="Nachricht an ${u.display}..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="send()">↑</button>
    </div>`;
  loadHistory(u.username);
}

async function loadHistory(other) {
  const r = await fetch(`${S}/api/history/${other}?me=${me}`);
  const msgs = await r.json();
  msgs.forEach(renderMsg);
  if (msgs.length) { lastIds[other] = msgs[msgs.length-1].id; previews[other] = msgs[msgs.length-1].message; }
  scrollBottom();
}

async function pollAll() {
  for (const u of users.filter(u => u.username !== me)) {
    const since = lastIds[u.username] || 0;
    try {
      const r = await fetch(`${S}/api/poll/${u.username}?me=${me}&since=${since}`);
      const msgs = await r.json();
      msgs.forEach(m => {
        lastIds[u.username] = Math.max(lastIds[u.username]||0, m.id);
        previews[u.username] = m.message;
        if (activeChat === u.username) { renderMsg(m); scrollBottom(); }
      });
      if (msgs.length) renderContacts();
    } catch(e) {}
  }
}

function renderMsg(msg) {
  const container = document.getElementById("messages");
  if (!container) return;
  const isMine = msg.from === me;
  const time = new Date(msg.timestamp).toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"});
  const div = document.createElement("div");
  div.className = "msg " + (isMine ? "mine" : "theirs");
  div.innerHTML = `
    <div class="msg-meta"><span class="msg-name ${isMine?'is-me':''}">${isMine?"Du":msg.display_name}</span><span>${time}</span></div>
    <div class="msg-bubble">${esc(msg.message)}</div>`;
  container.appendChild(div);
}

async function send() {
  const input = document.getElementById("msg-input");
  if (!input || !activeChat) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  await fetch(`${S}/api/chat`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:me,to:activeChat,message:text})});
}

// Reset
function openReset() { document.getElementById("reset-modal").classList.add("visible"); }
function closeReset() { document.getElementById("reset-modal").classList.remove("visible"); }
async function confirmReset() {
  closeReset();
  const r = await fetch(`${S}/api/reset`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:me})});
  const d = await r.json();
  if (d.success) { setTimeout(() => location.reload(), 500); }
}

function handleKey(e) { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }
function scrollBottom() { const m=document.getElementById("messages"); if(m) m.scrollTop=m.scrollHeight; }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
document.addEventListener("keydown",e=>{ if(e.key==="Enter"&&document.getElementById("login-screen").style.display!=="none") login(); });
</script>
</body>
</html>
